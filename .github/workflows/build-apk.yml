name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          cd android_app
          echo y | docker run -i --rm -v $PWD:/app kivy/buildozer:latest android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DS-Balance-APK
          path: android_app/bin/*.apk
          if-no-files-found: error
